services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/platform/migrations:/migrations:ro
    entrypoint:
      - sh
      - -c
      - |
        psql postgresql://analytics:analytics@postgres:5432/analytics?sslmode=disable \
          -v ON_ERROR_STOP=1 \
          -f /migrations/000001_create_init_tables.up.sql
    restart: "no"

  analytics:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - default
      - platform-kafka-network
    environment:
      HTTP_PORT: "8080"
      GRPC_PORT: "9090"
      KAFKA_BROKERS: compose-redpanda-1:9092
      KAFKA_TOPIC: focus.events
      KAFKA_GROUP_ID: analytics-service
      STORE_BACKEND: postgres
      POSTGRES_DSN: postgres://analytics:analytics@postgres:5432/analytics?sslmode=disable
      CONFIG_PATH: config/application.yml
    ports:
      - "8081:8080"
      - "9090:9090"
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  platform-kafka-network:
    external: true
    name: compose_default
